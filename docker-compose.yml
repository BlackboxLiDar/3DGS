services:
  pipeline:
    build: .
    runtime: nvidia
    shm_size: '8g'
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - TF_FORCE_GPU_ALLOW_GROWTH=true
    volumes:
      - ./ai-pipeline/data:/workspace/ai-pipeline/data
      - ./ai-pipeline/outputs:/workspace/ai-pipeline/outputs
      - ./ai-pipeline/third_party:/workspace/ai-pipeline/third_party
    working_dir: /workspace
