spring:
  config:
    import: optional:classpath:application-secret.yml
  
  # MySQL 설정
  datasource:
    url: jdbc:mysql://localhost:3306/youthfi_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${DB_PASSWORD} # secret 파일에서 가져옴
  
  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  # Redis 설정
  data:
    redis:
      host: 127.0.0.1
      port: 6379

  # 파일 업로드 설정
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

  # OAuth2 설정 (아이디/비번은 변수 처리)
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - profile
              - email
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - name
              - email
              - profile_image
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            client-name: Kakao
            scope:
              - profile_nickname
              - profile_image
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

# 인증 제외 경로 (컨트롤러에 맞춰 /v1 추가 완료)
exclude-auth-path-patterns:
  paths:
    - path-pattern: /api/v1/auth/**
      method: POST
    - path-pattern: /api/v1/reconstruction/**
      method: POST
    - path-pattern: /api/v1/reconstruction/**
      method: GET
    - path-pattern: /outputs/**
      method: GET
    - path-pattern: /swagger-ui/**
      method: GET
    - path-pattern: /v3/api-docs/**
      method: GET
# (이하 생략 - 기존 설정 유지)

cors:
  allowed-origins: "http://localhost:5173,http://localhost:3000,http://localhost:8080"
  allowed-methods: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
  allowed-headers: "Authorization,Content-Type,Accept,Origin,X-Requested-With"
  max-age: 3600

jwt:
  key: ${JWT_SECRET_KEY}
  access:
    expiration: 3600000
  refresh:
    expiration: 1209600000

email:
  from: no-reply@youthfi.com